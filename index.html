<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwindCss + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUi all themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <title>Job Application Tracker</title>


</head>

<body class="container mx-auto">
    <!-- dashboard -->
    <section>
        <h1 class="text-[#002C5C] text-[32px] font-bold my-5">Job Application Tracker</h1>
        <div class="dash-card flex justify-between items-center">
            <div class="bg-white p-5 w-[310px] rounded-sm shadow-md">
                <p class="text-[14px]">Total</p>
                <h3 class="text-[#002C5C] text-[24px] font-bold"></h3>
            </div>
            <div class="dash-card bg-white p-5 w-[310px] rounded-sm shadow-md">
                <p class="text-[14px]">Total</p>
                <h3 class="text-[#10B981] text-[24px] font-bold"></h3>
            </div>
            <div class="dash-card bg-white p-5 w-[310px] rounded-sm shadow-md">
                <p class="text-[14px]">Total</p>
                <h3 class="text-[#EF4444] text-[24px] font-bold"></h3>
            </div>
        </div>
    </section>

    <!-- available job -->
     <section>
        <h1>Available Jobs</h1>
        <p></p>
     </section>
<script src="./scripts/helpers.js"></script>
<script src="./scripts/main.js"></script>
</body>

</html>
